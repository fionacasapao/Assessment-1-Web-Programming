<html lang="en"> <!--lang="en" tells the browswer and search engines that the language of the page is English.-->
  <head> 
    <meta charset="UTF-8" /> <!--"UTF-8"-alllow to display letters, numbers, and special characters from many languages-->

    <!--http-equiv="X-UA-Compatible" → instruction for Internet Explorer.
        content="IE=edge" → Forces the browser to use the most modern version of IE’s rendering mode.-->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" /> 
    <!--name="viewport" → Controls the page displays.
        width=device-width → Sets the page width equal to the device screen width.
        initial-scale=1.0 → Sets the zoom level to 100%-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" type="text/css" /> <!--Use to connect a HTML file the CSS file-->
    <link rel="stylesheet" href="additionalStyle.css" type="text/css" /> <!--Use to connect a HTML file the CSS file-->

    <title>Styling those divs</title> <!--This title will appear at the very top of the webpage-->
  </head>
  <body>
    <div>div#A</div> <!--container element-->
    <div>div#B</div> <!--container element-->
    <div>div#C</div> <!--container element-->
    <div>div#D</div> <!--container element-->
  </body>
</html>
