<!--
Petrol Calculator
This file contains the structure of the calculator
-->

<!DOCTYPE html> <!--document is written in HTML-->
<html>
<head>
    <title>Petrol Calculator</title> <!--This title will appear at the very top of the webpage-->

    <!-- connecting the css file -->
    <link rel="stylesheet" href="style.css"> <!--Use to connect a HTML file with the CSS file-->
</head>

<body>

<!--div - container element
    class="sample" use to style this group of elements in CSS-->
<div class="container">

    <!-- title -->
    <h2>Petrol Calculator</h2> <!--Subheading-->

    <!--label - for an input field.
        input - input field where the user can insert data.
        type="number" - numbers only
        id="price" - a unique identifier.
        value="1.72" - Sets the default value
        step="0.01" - Defines the increment amount-->
    <label>Cost of Petrol per Liter</label> 
    <input type="number" id="price" value="1.72" step="0.01">

    <!--label - for an input field.
        input - input field where the user can insert data.
        type="number" - numbers only
        id="price" - a unique identifier.
        value="1.72" - Sets the default value-->
    <label>Liters Purchased</label>
    <input type="number" id="liters" value="0">

    <!-- button to calculate -->
    <button onclick="calculate()">Calculate</button> <!--creates a clickable button in the webpage-->

    <!-- result --> 
    <p id="result">Total Cost: 0</p> <!--Used to display the result-->

</div>

<!-- connecting javascript -->
<script src="script.js"></script> <!--use to tag JavaScript to an HTML file-->

</body>
</html>
